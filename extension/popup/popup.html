<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharp</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-card: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --accent: #6c5ce7;
      --border: #d2d2d7;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg-card: #2c2c2e;
        --text: #f5f5f7;
        --text-secondary: #98989d;
        --accent: #7c6cf0;
        --border: #38383a;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 20px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .settings {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .setting-row label {
      font-size: 13px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: var(--accent);
    }

    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    .shortcut {
      padding: 8px 20px 16px;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }

    kbd {
      display: inline-block;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Sharp</h1>
    <p>Prompt optimizer</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="value" id="prompt-count">0</div>
      <div class="label">Prompts Sharpened</div>
    </div>
    <div class="stat-card">
      <div class="value" id="tokens-saved">0</div>
      <div class="label">Tokens Saved</div>
    </div>
  </div>

  <div class="settings">
    <div class="setting-row">
      <label>Auto-sharpen on send</label>
      <div class="toggle">
        <input type="checkbox" id="auto-sharpen">
        <span class="slider"></span>
      </div>
    </div>
  </div>

  <div class="shortcut">
    Sharpen: <kbd>Cmd+Shift+S</kbd>
  </div>

  <script src="popup.js"></script>
</body>
</html>
